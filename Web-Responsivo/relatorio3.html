<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 300px;
      }

      textarea {
        height: 100px;
      }
    </style>
  </head>
  <body>
    <form>
      <h2>Contato</h2>
      <input type="text" placeholder="Nome" />
      <textarea placeholder="Mensagem"></textarea>
      <button>Enviar</button>
    </form>
  </body>
</html>
